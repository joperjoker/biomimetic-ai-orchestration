name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC): no API token or secret is stored anywhere.
# The package version comes from pyproject.toml, so tag the release to match
# (for example, tag v0.0.1 for version 0.0.1).

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tropos
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
